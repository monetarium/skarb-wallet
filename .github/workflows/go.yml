name: Build

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gio dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev \
            libvulkan-dev

      - name: Cache Go module download cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: go mod download
        run: go mod download

      - name: go vet (Skarb packages, cgo off)
        # gioui.org v0.7.0 ships cgo shims (gioui.org/cpu/driver.go,
        # gioui.org/internal/vk/vulkan.go) that define Go methods on C-side
        # struct types. With CGO_ENABLED=1 vet's parser can't resolve the
        # cgo-generated types and emits "cannot define new methods on
        # non-local type" for every receiver in those files. The actual
        # code compiles fine and `go build ./...` (the build step below)
        # passes — this is a known vet/cgo limitation, not a real defect.
        #
        # Fix: vet does NOT need cgo. With CGO_ENABLED=0 the //go:build
        # cgo (or //go:build linux + cgo) constraints exclude the entire
        # cgo source files; vet then sees zero files to parse in those
        # packages and prints a harmless "build constraints exclude all"
        # note instead of choking on phantom methods. The cgo build for
        # the real binary happens in the next step with default
        # CGO_ENABLED=1 so the actual artifact still has working Vulkan
        # / X11 bindings.
        env:
          CGO_ENABLED: "0"
        run: go list ./... | grep -v '/_vendored/' | xargs go vet

      - name: go build ./...
        run: GOFLAGS="-mod=mod -trimpath" go build -trimpath -ldflags "-s -w -buildid=" -buildvcs=false ./...

      - name: localisation tests
        run: GOFLAGS="-mod=mod" go test ./ui/values/...

      - name: Backend smoke test
        run: GOFLAGS="-mod=mod" go run ./cmd/smoke