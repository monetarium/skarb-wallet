name: Build

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gio dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev \
            libvulkan-dev

      - name: Cache Go module download cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: go mod download
        run: go mod download

      - name: go vet (Skarb packages only)
        # gioui.org's cgo shims (gioui.org/cpu, gioui.org/internal/vk) trigger
        # a known false-positive in `go vet` on Linux: vet's parser doesn't
        # fully resolve cgo-generated types so the method definitions in
        # driver.go / vulkan.go are reported as "cannot define new methods on
        # non-local type". The actual code compiles fine (build step below
        # passes); this is a vet limitation, not a real defect, and there is
        # no upstream fix on the gioui.org v0.7.0 line we depend on.
        #
        # Scope vet to the Skarb-owned packages so the bug-prone gioui
        # internal pkgs are not pulled into vet's type-checker. We still
        # vet every file we actually maintain — none of which use cgo.
        # xargs (instead of `vet $(go list)`) is intentional: it splits
        # the newline-separated list into one arg per package regardless
        # of the runner's shell IFS settings.
        run: go list ./... | grep -v '/_vendored/' | grep -v 'gioui\.org/' | xargs go vet

      - name: go build ./...
        run: GOFLAGS="-mod=mod -trimpath" go build -trimpath -ldflags "-s -w -buildid=" -buildvcs=false ./...

      - name: localisation tests
        run: GOFLAGS="-mod=mod" go test ./ui/values/...

      - name: Backend smoke test
        run: GOFLAGS="-mod=mod" go run ./cmd/smoke