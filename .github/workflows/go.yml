name: Build

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gio dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev \
            libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev \
            libvulkan-dev

      - name: Cache Go module download cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: go mod download
        run: go mod download

      - name: go vet (backend packages)
        # gioui.org's cgo shims (gioui.org/cpu/driver.go,
        # gioui.org/internal/vk/vulkan.go) trigger a vet false-positive on
        # Linux: vet's parser doesn't fully resolve cgo-generated types,
        # so method receivers on those types are reported as "cannot
        # define new methods on non-local type". CGO_ENABLED=0 doesn't
        # help — without cgo the vk package becomes empty and the
        # gioui/app import chain breaks with a "build constraints
        # exclude all Go files" import error. Both states fail vet, and
        # there's no upstream fix on the gioui v0.7-0.10 line.
        #
        # Workaround: vet only the UI-free packages (libwallet, cmd
        # backend tools) where the bulk of recent changes land AND
        # which don't transitively pull gioui. The full UI is still
        # validated by `go build ./...` below — build is a strict
        # superset of vet's type check, so anything vet would catch in
        # the UI also surfaces there. Localisation tests and the smoke
        # binary exercise the rest.
        run: go vet ./libwallet/... ./cmd/...

      - name: go build ./...
        run: GOFLAGS="-mod=mod -trimpath" go build -trimpath -ldflags "-s -w -buildid=" -buildvcs=false ./...

      - name: localisation tests
        run: GOFLAGS="-mod=mod" go test ./ui/values/...

      - name: Backend smoke test
        run: GOFLAGS="-mod=mod" go run ./cmd/smoke